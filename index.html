<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Truquo · Onboarding</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="ob-container">
        <div class="ob-step active" id="ob-step-1">
            <div class="ob-title">¡Hola! Bienvenido a Truquo</div>
            <div class="ob-text">La app donde intercambias lo que tienes por lo que necesitas.</div>
            <button class="ob-btn-primary" onclick="obGoTo(2)">Empezar</button>
        </div>

        <div class="ob-step" id="ob-step-2" style="display:none">
            <div class="ob-title">¿Dónde estás?</div>
            <div class="ob-text">Dinos tu ubicación para ver ofertas cerca.</div>
            <input id="ob-loc-input" class="ob-input" placeholder="Ciudad o CP">
            <button class="ob-btn-primary" onclick="obGoTo(3)">Siguiente</button>
        </div>

        <div class="ob-step" id="ob-step-3" style="display:none">
            <div class="ob-title">Tu foto de perfil</div>
            <div class="ob-text">Ayuda a generar confianza.</div>
            <div class="photo-wrapper">
                <div id="ob-photo-preview" onclick="document.getElementById('ob-file').click()" class="photo-placeholder">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#cbd5e0" stroke-width="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>
                </div>
                <input type="file" id="ob-file" style="display:none" accept="image/*" onchange="obPreview(this)">
            </div>
            <button class="ob-btn-primary" onclick="obGoTo(4)">Siguiente</button>
            <div class="nav-links">
                <button onclick="obGoTo(2)" class="btn-link">&larr; Atrás</button>
                <button onclick="obGoTo(4)" class="btn-link">Saltar &rarr;</button>
            </div>
        </div>

        <div class="ob-step" id="ob-step-4" style="display:none">
            <div class="ob-title">¿Qué buscas?</div>
            <div class="wish-group">
                <input id="ob-wish-input" class="ob-input" placeholder="Ej: Bicicleta" onkeydown="if(event.key==='Enter'){obAddWish()}">
                <button onclick="obAddWish()" class="ob-btn-add">+</button>
            </div>
            <div id="ob-wish-tags" class="tag-container"></div>
            <button class="ob-btn-primary" onclick="obFinish()">Finalizar</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
